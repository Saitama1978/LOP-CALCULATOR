<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOP-CALCULATOR</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0F172A; color: #E2E8F0; padding: 15px; margin: 0; }
        .container { max-width: 700px; margin: 0 auto; background-color: #1E293B; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #38BDF8; font-size: 26px; font-weight: 800; border-bottom: 2px solid #334155; padding-bottom: 12px; margin-top: 0; letter-spacing: 1px; }
        h3 { color: #0EA5E9; border-left: 4px solid #0EA5E9; padding-left: 8px; margin-top: 20px; font-size: 16px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; margin-top: 10px; font-size: 13px; color: #94A3B8; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; background-color: #334155; border: 1px solid #475569; border-radius: 6px; color: white; font-size: 15px; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: #38BDF8; outline: none; }
        .row-inline { display: flex; gap: 10px; align-items: center; }
        button { width: 100%; background-color: #0EA5E9; color: #0F172A; border: none; padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #38BDF8; }
        .btn-secondary { background-color: #475569; color: white; margin-top: 12px; padding: 10px; }
        .result-box { background-color: #0F172A; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid #38BDF8; display: none; }
        .result-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1E293B; font-size: 15px; }
        .highlight { font-weight: bold; color: #F59E0B; }
        canvas { background-color: #111827; border: 1px solid #374151; width: 100%; height: 350px; margin-top: 15px; border-radius: 8px; }
        
        /* DEVELOPER FOOTER CREDITS STYLE */
        .dev-footer { text-align: center; margin-top: 30px; padding-top: 15px; border-top: 1px solid #334155; font-size: 12px; color: #64748B; }
        .dev-name { color: #F59E0B; font-weight: bold; font-size: 14px; letter-spacing: 0.5px; margin-top: 3px; }

        @media print {
            body { background-color: white; color: black; }
            .container { box-shadow: none; background-color: white; width: 100%; max-width: 100%; padding: 0; }
            button, select, input, textarea { display: none; }
            .result-box { display: block !important; border: 1px solid black; }
            .dev-footer { color: black; border-top: 1px solid black; }
            .dev-name { color: black; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚓ LOP-CALCULATOR</h1>

    <h3>📝 Vessel Voyage Log</h3>
    <div class="grid-2">
        <div>
            <label>Vessel Name:</label>
            <input type="text" id="vesselName" placeholder="e.g. MV Saitama Maru">
        </div>
        <div>
            <label>Voyage Number:</label>
            <input type="text" id="voyageNo" placeholder="e.g. 024-OUT">
        </div>
    </div>
    <div class="grid-2">
        <div>
            <label>Officer on Watch (OOW):</label>
            <input type="text" id="oowName" placeholder="e.g. Renante Fullo (OOW)">
        </div>
        <div>
            <label>Remarks / Target Description:</label>
            <input type="text" id="remarks" placeholder="e.g. Evening Star Sight / Good Horizon">
        </div>
    </div>

    <h3>🌌 Target Body</h3>
    <label>Select Celestial Body / Target Star:</label>
    <select id="bodySelect">
        <optgroup label="Core Bodies">
            <option value="sun">Sun (Araw)</option>
            <option value="moon">Moon (Buwan)</option>
        </optgroup>
        <optgroup label="Navigational Planets">
            <option value="venus">Venus</option>
            <option value="mars">Mars</option>
            <option value="jupiter">Jupiter</option>
            <option value="saturn">Saturn</option>
        </optgroup>
        <optgroup label="Navigational Stars">
            <option value="sirius" selected>Sirius (SHA 258° / Dec -16°)</option>
            <option value="canopus">Canopus (SHA 263° / Dec -52°)</option>
            <option value="rigel">Rigel (SHA 281° / Dec -08°)</option>
            <option value="achernar">Achernar (SHA 335° / Dec -57°)</option>
            <option value="vega">Vega (SHA 96° / Dec +38°)</option>
            <option value="arcturus">Arcturus (SHA 145° / Dec +19°)</option>
            <option value="aldebaran">Aldebaran (SHA 290° / Dec +16°)</option>
            <option value="antares">Antares (SHA 112° / Dec -26°)</option>
            <option value="spica">Spica (SHA 158° / Dec -11°)</option>
            <option value="pollux">Pollux (SHA 243° / Dec +28°)</option>
        </optgroup>
    </select>

    <h3>🕒 Time & Date Settings</h3>
    <div class="grid-2">
        <div>
            <label>Local Time & Date:</label>
            <input type="datetime-local" id="localTime" onchange="calculateUTC()">
        </div>
        <div>
            <label>Zone Description (ZD):</label>
            <input type="number" id="zd" value="8" step="1" onchange="calculateUTC()">
        </div>
    </div>
    <label>Calculated UTC / GMT (AUTO):</label>
    <input type="text" id="utcTime" readonly style="background-color: #1E293B; color: #10B981; font-weight: bold;">

    <h3>🌐 Assumed Position (AP)</h3>
    <div class="grid-2">
        <div>
            <label>Assumed Latitude:</label>
            <div class="row-inline">
                <input type="number" id="latDeg" placeholder="Deg" value="14">
                <input type="number" id="latMin" placeholder="Min" value="30" step="0.1">
                <select id="latDir" style="width: 70px;"><option value="N">N</option><option value="S">S</option></select>
            </div>
        </div>
        <div>
            <label>Assumed Longitude:</label>
            <div class="
